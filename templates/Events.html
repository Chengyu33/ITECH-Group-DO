{% extends 'base.html' %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <h2 class="fw-bold mb-0" style="color: #2c3e50;">Upcoming Events</h2>
        <input type="text" id="searchInput" class="form-control rounded-pill" placeholder="Search events..." style="max-width: 280px;">
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="eventContainer">

        {% for event in events %}
        <div class="col">
            <div class="card h-100 border-0 shadow-sm rounded-4">
                <img src="{{ event.image }}"
                     class="card-img-top rounded-top-4"
                     alt="Event Poster"
                     style="height: 200px; object-fit: cover;">

                <div class="card-body">
                    <h5 class="card-title fw-bold">{{ event.title }}</h5>
                    <p class="card-text text-muted mb-1">📅 Time: {{ event.date_time }}</p>
                    <p class="card-text text-muted">📍 Location: {{ event.location }}</p>
                    <p class="card-text mt-2">{{ event.description }}</p>
                </div>

                <div class="card-footer bg-white border-0 pb-3 pt-0">
                    <a href="{% url 'event_detail' %}" class="btn btn-outline-dark w-100 rounded-pill fw-bold">
                        View Details / Register
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
        </div>
</div>
{% endblock %}
