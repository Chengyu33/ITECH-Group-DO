{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Event Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
            🎉 Event Hub
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="{% url 'home' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'my_tickets' %}">My Tickets</a>
                </li>
                {% if user.is_staff %}
                <li class="nav-item">
                    <a class="nav-link text-warning" href="{% url 'create_event' %}">⚙️ Create Event</a>
                </li>
                {% endif %}
            </ul>

            <div class="d-flex align-items-center gap-2">
                {% if user.is_authenticated %}
                    <span class="text-white">👤 {{ user.username }}</span>
                    <a href="{% url 'logout' %}" class="btn btn-outline-light rounded-pill fw-bold">Sign Out</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-primary rounded-pill fw-bold">Sign In</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<main class="container mt-4">
    {% block content %}
    {% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
