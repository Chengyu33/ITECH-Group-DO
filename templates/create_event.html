<!DOCTYPE html>
<html>
<head>
    <title>Create Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { font-family: Arial, sans-serif; }
        .my-nav { background-color: #333333; padding: 15px; color: white; }
        .my-nav a { color: white; text-decoration: none; margin-right: 20px; }
    
        .form-box {
            border: 2px solid #888888;
            padding: 20px;
            margin-top: 30px;
            background-color: #f4f4f4;
            width: 70%;
            margin-left: auto;
            margin-right: auto; 
            border-radius: 15px; 
        }
    </style>
</head>
<body>

    <div class="my-nav">
        <h2>🎉 Event Hub</h2>
        <a href="/">Home</a> 
        <a href="/tickets/">My Tickets</a> 
        <a href="/create/">Create Event</a>
        <a href="/login/">Sign In</a>
    </div>

    <div class="container">
        
        <div class="form-box">
            <h2 style="color: darkred;">🛠️ Create New Event (Admin Only)</h2>
            <hr>

            <form action="#" method="POST">
                
                <label><b>Event Title:</b></label><br>
                <input type="text" class="form-control" placeholder="e.g., Campus Music Festival">
                <br>

                <label><b>Date & Time:</b></label><br>
                <input type="datetime-local" class="form-control">
                <br>

                <label><b>Location:</b></label><br>
                <input type="text" class="form-control" placeholder="e.g., Main Hall">
                <br>

                <label><b>Poster Image URL:</b></label><br>
                <input type="text" class="form-control" placeholder="https://example.com/image.jpg">
                <p style="color: gray; font-size: 13px;">Paste the link to the event poster image.</p>
                
                <label><b>Description:</b></label><br>
                <textarea class="form-control" rows="5"></textarea>
                <br><br>

                <center>
                    <button type="button" class="btn btn-dark" style="width: 200px; padding: 10px;" onclick="alert('活动发布成功！')">
                        Publish Event
                    </button>
                </center>
                
            </form>
        </div>

    </div>

</body>
</html>
