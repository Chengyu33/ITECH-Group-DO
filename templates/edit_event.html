{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-5">
                    
                    <div class="text-center mb-4 border-bottom pb-4">
                        <h2 class="fw-bold" style="color: #2c3e50;">Edit Event</h2>
                        <p class="text-muted mb-0">You are updating: <strong class="text-dark">{{ event.title }}</strong></p>
                    </div>

                    <form action="{% url 'edit_event' event.id %}" method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Event Title</label>
                            <input type="text" name="title" class="form-control form-control-lg rounded-3" value="{{ event.title }}" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Start Time</label>
                                <input type="datetime-local" name="start_time" class="form-control rounded-3" value="{{ event.start_time|date:'Y-m-d\TH:i' }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">End Time</label>
                                <input type="datetime-local" name="end_time" class="form-control rounded-3" value="{{ event.end_time|date:'Y-m-d\TH:i' }}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Location</label>
                            <input type="text" name="location" class="form-control rounded-3" value="{{ event.location }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Category</label>
                            <input type="text" name="category" class="form-control rounded-3" value="{{ event.category }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Cover Image URL</label>
                            <input type="url" name="image" class="form-control rounded-3" value="{{ event.image }}">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Description</label>
                            <textarea name="description" class="form-control rounded-3" rows="5" required>{{ event.description }}</textarea>
                        </div>

                        <div class="d-grid gap-3 mt-4">
                            <button type="submit" class="btn btn-warning btn-lg rounded-pill fw-bold text-dark">
                                Save Changes
                            </button>
                            <a href="{% url 'event_detail' event.id %}" class="btn btn-outline-secondary rounded-pill fw-bold py-2">
                                Cancel
                            </a>
                        </div>
                        
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
