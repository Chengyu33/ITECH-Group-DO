{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-5">
                    
                    <div class="text-center mb-4 border-bottom pb-4">
                        <h2 class="fw-bold" style="color: #2c3e50;">📝 Complete Registration</h2>
                        <p class="text-muted mb-0">You are registering for: <strong class="text-dark">{{ event.title }}</strong></p>
                    </div>
                    {% if error_msg %}
                        <div class="alert alert-danger fw-bold text-center mb-4 shadow-sm" role="alert">
                            {{ error_msg }}
                        </div>
                    {% endif %}
                    <form action="" method="POST">
                        {% csrf_token %} 
                        <div class="mb-3">
                        <label for="nameInput" class="form-label fw-bold">Full Name</label>
                        <input type="text" name="student_name" class="form-control form-control-lg rounded-3" id="nameInput" value="{{ user.get_full_name }}" placeholder="Enter your full name" required>
                    </div>

                    <div class="mb-3">
                        <label for="studentIdInput" class="form-label fw-bold">Student ID</label>
                        <input type="text" name="student_id" class="form-control form-control-lg rounded-3" id="studentIdInput" placeholder="e.g. 2345678" required>
                    </div>

                        <div class="mb-3">
                            <label for="phoneInput" class="form-label fw-bold">Phone Number</label>
                            <input type="tel" name="phone" class="form-control form-control-lg rounded-3" id="phoneInput" placeholder="e.g. 07700 900000" required>
                        </div>

                        <div class="mb-4">
                            <label for="remarksInput" class="form-label fw-bold">Remarks / Dietary Needs</label>
                            <textarea name="remarks" class="form-control rounded-3" id="remarksInput" rows="4" placeholder="Any special requirements?"></textarea>
                        </div>

                        <div class="d-grid gap-3 mt-5">
                            <button type="submit" class="btn btn-dark btn-lg rounded-pill fw-bold">
                                Confirm Registration
                            </button>
                            <a href="{% url 'event_detail' event.id %}" class="btn btn-outline-secondary rounded-pill fw-bold py-2">
                                Cancel & Go Back
                            </a>
                        </div>
                        
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
